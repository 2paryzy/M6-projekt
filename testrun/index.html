<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forside - F1 Bets</title>

    <link rel="stylesheet" href="css/layout.css">
</head>

<body>

    <div id="navbar"></div>

    <section class="hero">
        <img src="images/pexels-jonathanborba-29406740.jpg" alt="Formel 1 bil">

        <h1>Bedste ODDS på F1</h1>

        <a href="konto.html" class="btn-green">Opret konto</a>
    </section>

    <section class="odds-section">

        <h2>Dagens F1 Odds</h2>

        <div class="odds-container">

            <div class="odds-header">
                <span>Kører</span>
                <span>Odds</span>
            </div>

            <div class="odds-row">
                <span>Charles Leclerc</span>
                <button class="odds-btn">3.00</button>
            </div>

            <div class="odds-row">
                <span>Lewis Hamilton</span>
                <button class="odds-btn">5.00</button>
            </div>

            <div class="odds-row">
                <span>Lando Norris</span>
                <button class="odds-btn">6.50</button>
            </div>

            <div class="odds-row">
                <span>Max Verstappen</span>
                <button class="odds-btn">10.00</button>
            </div>

            <div class="odds-row">
                <span>George Russell</span>
                <button class="odds-btn">12.00</button>
            </div>

        </div>

    </section>

    <script src="js/loadNavbar.js"></script>

</body>

</html>
