<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opret konto</title>
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>

<div id="navbar"></div>

<section class="content">

    <h1>Opret konto</h1>

    <form>

        <label for="firstname">Fornavn</label><br>
        <input type="text" id="firstname" name="firstname" required><br><br>

        <label for="lastname">Efternavn</label><br>
        <input type="text" id="lastname" name="lastname" required><br><br>

        <label for="email">E-mail</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="phone">Telefonnummer</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>

        <label for="birthdate">Fødselsdato</label><br>
        <input type="date" id="birthdate" name="birthdate" required><br><br>

        <label for="address">Adresse</label><br>
        <input type="text" id="address" name="address" required><br><br>

        <label for="city">By</label><br>
        <input type="text" id="city" name="city" required><br><br>

        <label for="postcode">Postnummer</label><br>
        <input type="text" id="postcode" name="postcode" required><br><br>

        <label for="username">Brugernavn</label><br>
        <input type="text" id="username" name="username" required><br><br>

        <label for="password">Adgangskode</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <label for="confirmPassword">Bekræft adgangskode</label><br>
        <input type="password" id="confirmPassword" name="confirmPassword" required><br><br>

        <input type="checkbox" id="terms" required>
        <label for="terms">
            Jeg bekræfter, at jeg er mindst 18 år og accepterer vilkår og betingelser.
        </label>

        <br><br>

        <button type="submit" class="btn-green">
            Opret konto
        </button>

    </form>

    <br>

    <p>
        Har du allerede en konto?
        <a href="login.html">Log ind her</a>
    </p>

</section>

<script src="js/loadNavbar.js"></script>

</body>
</html>
